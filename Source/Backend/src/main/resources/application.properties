spring.application.name=CST339Milestone
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/blodged}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:blodged}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:blodged}
spring.datasource.driver-class-name=org.postgresql.Driver

springdoc.packages-to-scan=com.blodged.controller.REST
springdoc.paths-to-match=/api/**
springdoc.swagger-ui.path=/swagger.html

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

# Allow local frontend dev servers across ports (Vite/preview/etc.)
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*